spring:
  application:
    name: vtuber-card-battle
  datasource:
    url: jdbc:postgresql://localhost:5432/vcb2
    username: postgres
    password: my_secret_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

